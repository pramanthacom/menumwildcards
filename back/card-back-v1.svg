<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1400" height="2400" viewBox="0 0 1400 2400" role="img" aria-labelledby="title desc">
  <title id="title">Рубашка карт MENUM × WILD</title>
  <desc id="desc">Тёмная рубашка с крупным медным солнечным знаком и орнаментом из логотипов MENUM и WILD.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07110d"/>
      <stop offset="0.46" stop-color="#102019"/>
      <stop offset="1" stop-color="#0b0b09"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="46%" r="58%">
      <stop offset="0" stop-color="#d18a47" stop-opacity=".34"/>
      <stop offset=".38" stop-color="#a55d2d" stop-opacity=".13"/>
      <stop offset="1" stop-color="#07110d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunMetal" cx="38%" cy="30%" r="78%">
      <stop offset="0" stop-color="#f3c77d"/>
      <stop offset=".24" stop-color="#d48a46"/>
      <stop offset=".62" stop-color="#a94f28"/>
      <stop offset="1" stop-color="#5d281c"/>
    </radialGradient>
    <linearGradient id="copperStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1bd70"/>
      <stop offset=".48" stop-color="#c77538"/>
      <stop offset="1" stop-color="#7d3724"/>
    </linearGradient>
    <filter id="copperize" color-interpolation-filters="sRGB">
      <feColorMatrix type="matrix" values="
        0 0 0 0 .82
        0 0 0 0 .48
        0 0 0 0 .24
        0 0 0 .52 0"/>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" seed="17" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="faded">
        <feFuncA type="table" tableValues="0 .18"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faded" mode="soft-light"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="1400" height="2400" rx="86"/>
    </clipPath>
    <pattern id="brandPattern" width="520" height="430" patternUnits="userSpaceOnUse" patternTransform="rotate(-7)">
      <g filter="url(#copperize)" opacity=".42">
        <image href="../brand/menum-logo-source.png" x="42" y="42" width="92" height="92" preserveAspectRatio="xMidYMid meet"/>
        <image href="../brand/wild-logo-source.png" x="220" y="34" width="238" height="139" preserveAspectRatio="xMidYMid meet"/>
        <image href="../brand/wild-logo-source.png" x="18" y="260" width="226" height="132" preserveAspectRatio="xMidYMid meet"/>
        <image href="../brand/menum-logo-source.png" x="355" y="282" width="82" height="82" preserveAspectRatio="xMidYMid meet"/>
      </g>
      <g fill="#d18445" opacity=".16">
        <circle cx="176" cy="204" r="5"/>
        <circle cx="318" cy="222" r="3"/>
        <circle cx="470" cy="214" r="4"/>
        <circle cx="286" cy="394" r="4"/>
      </g>
    </pattern>
    <path id="rayLong" d="M0 -664 L0 -486"/>
    <path id="rayShort" d="M0 -610 L0 -492"/>
    <path id="rayDiamond" d="M0 -654 L15 -624 L0 -594 L-15 -624 Z"/>
  </defs>

  <g clip-path="url(#cardClip)" filter="url(#grain)">
    <rect width="1400" height="2400" fill="url(#bg)"/>
    <rect width="1400" height="2400" fill="url(#halo)"/>
    <rect x="-120" y="-80" width="1640" height="2560" fill="url(#brandPattern)" opacity=".74"/>

    <g opacity=".18" stroke="#d28545" fill="none">
      <circle cx="700" cy="1200" r="710" stroke-width="2" stroke-dasharray="3 24"/>
      <circle cx="700" cy="1200" r="760" stroke-width="1" stroke-dasharray="1 31"/>
      <path d="M175 1200 H1225 M700 675 V1725" stroke-width="1" stroke-dasharray="4 25"/>
    </g>

    <circle cx="700" cy="1200" r="610" fill="#ca7138" opacity=".08" filter="url(#softGlow)"/>

    <g transform="translate(700 1200)" fill="none" stroke="url(#copperStroke)" stroke-linecap="round">
      <g stroke-width="8" opacity=".88">
        <use href="#rayLong" transform="rotate(0)"/><use href="#rayLong" transform="rotate(30)"/>
        <use href="#rayLong" transform="rotate(60)"/><use href="#rayLong" transform="rotate(90)"/>
        <use href="#rayLong" transform="rotate(120)"/><use href="#rayLong" transform="rotate(150)"/>
        <use href="#rayLong" transform="rotate(180)"/><use href="#rayLong" transform="rotate(210)"/>
        <use href="#rayLong" transform="rotate(240)"/><use href="#rayLong" transform="rotate(270)"/>
        <use href="#rayLong" transform="rotate(300)"/><use href="#rayLong" transform="rotate(330)"/>
      </g>
      <g stroke-width="4" opacity=".62">
        <use href="#rayShort" transform="rotate(15)"/><use href="#rayShort" transform="rotate(45)"/>
        <use href="#rayShort" transform="rotate(75)"/><use href="#rayShort" transform="rotate(105)"/>
        <use href="#rayShort" transform="rotate(135)"/><use href="#rayShort" transform="rotate(165)"/>
        <use href="#rayShort" transform="rotate(195)"/><use href="#rayShort" transform="rotate(225)"/>
        <use href="#rayShort" transform="rotate(255)"/><use href="#rayShort" transform="rotate(285)"/>
        <use href="#rayShort" transform="rotate(315)"/><use href="#rayShort" transform="rotate(345)"/>
      </g>
      <g fill="#ce7b3d" stroke="none" opacity=".82">
        <use href="#rayDiamond" transform="rotate(0)"/><use href="#rayDiamond" transform="rotate(60)"/>
        <use href="#rayDiamond" transform="rotate(120)"/><use href="#rayDiamond" transform="rotate(180)"/>
        <use href="#rayDiamond" transform="rotate(240)"/><use href="#rayDiamond" transform="rotate(300)"/>
      </g>
    </g>

    <g transform="translate(700 1200)">
      <circle r="472" fill="none" stroke="#e0a158" stroke-width="5" opacity=".54"/>
      <circle r="438" fill="none" stroke="#a95d35" stroke-width="2" stroke-dasharray="7 18" opacity=".72"/>
      <circle r="389" fill="url(#sunMetal)" opacity=".96" filter="url(#softGlow)"/>
      <circle r="338" fill="#0c1712" stroke="#f0b562" stroke-width="4"/>
      <circle r="294" fill="none" stroke="#b76536" stroke-width="2" stroke-dasharray="2 15" opacity=".8"/>
      <circle r="224" fill="url(#sunMetal)"/>
      <circle r="148" fill="#09100d" stroke="#edb265" stroke-width="3"/>
      <circle r="88" fill="url(#sunMetal)" opacity=".94"/>
      <circle r="32" fill="#080b09"/>
      <g fill="#f0bc6d" opacity=".76">
        <circle cx="0" cy="-438" r="8"/><circle cx="219" cy="-379" r="6"/>
        <circle cx="379" cy="-219" r="8"/><circle cx="438" cy="0" r="6"/>
        <circle cx="379" cy="219" r="8"/><circle cx="219" cy="379" r="6"/>
        <circle cx="0" cy="438" r="8"/><circle cx="-219" cy="379" r="6"/>
        <circle cx="-379" cy="219" r="8"/><circle cx="-438" cy="0" r="6"/>
        <circle cx="-379" cy="-219" r="8"/><circle cx="-219" cy="-379" r="6"/>
      </g>
    </g>

    <g fill="none" stroke="url(#copperStroke)">
      <rect x="25" y="25" width="1350" height="2350" rx="72" stroke-width="5" opacity=".78"/>
      <rect x="54" y="54" width="1292" height="2292" rx="53" stroke-width="2" opacity=".62"/>
      <rect x="82" y="82" width="1236" height="2236" rx="38" stroke-width="1" opacity=".28" stroke-dasharray="5 14"/>
    </g>

    <g stroke="#dfa25a" fill="none" opacity=".62" stroke-width="4">
      <path d="M84 260 V130 Q84 84 130 84 H260"/>
      <path d="M1140 84 H1270 Q1316 84 1316 130 V260"/>
      <path d="M84 2140 V2270 Q84 2316 130 2316 H260"/>
      <path d="M1140 2316 H1270 Q1316 2316 1316 2270 V2140"/>
    </g>
  </g>
</svg>
